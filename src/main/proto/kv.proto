syntax = "proto3";

option java_multiple_files = true;
option java_package = "ru.cu.advancedgit.grpc";
option java_outer_classname = "KvProto";

service KvService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Range(RangeRequest) returns (stream RangeResponse);
  rpc Count(CountRequest) returns (CountResponse);
}

message PutRequest {
  string key = 1;
  bytes value = 2;
  bool has_value = 3;
}

message PutResponse {
  bool success = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  string key = 2;
  bytes value = 3;
  bool has_value = 4;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool deleted = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to = 2;
  int32 limit = 3; // Maximum number of records to return (0 = unlimited)
}

message RangeResponse {
  string key = 1;
  bytes value = 2;
  bool has_value = 3;
}

message CountRequest {
}

message CountResponse {
  int64 count = 1;
}